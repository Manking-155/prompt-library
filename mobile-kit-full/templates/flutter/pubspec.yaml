name: mobile_kit_app
description: MobileKit Flutter Application Template
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5
  riverpod: ^2.4.0

  # Navigation
  go_router: ^12.1.0

  # UI Components
  material_design_icons_flutter: ^1.1.1
  cupertino_icons: ^1.0.6

  # Networking
  dio: ^5.3.0
  retrofit: ^4.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2+1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700